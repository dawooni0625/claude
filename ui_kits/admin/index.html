<!doctype html>
<!-- @dsCard group="UI Kit — Admin" name="Admin UI Kit" subtitle="Clickable admin shell — sidebar + topbar + dashboard, members table, settings, login. Includes light/dark toggle." viewport="1280x800" -->
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280">
  <title>KIRBS · Admin UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      font-family: var(--font-family-base);
    }
    @keyframes kirbs-slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Hide scrollbars on overflow regions but keep functionality. */
    main::-webkit-scrollbar { width: 10px; height: 10px; }
    main::-webkit-scrollbar-thumb { background: var(--color-gray-5); border-radius: 99px; }
    main::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Order matters: leaves first (Icons, Atoms, Forms), then composite Surfaces, then nav,
       then screens (depend on Atoms+Forms+Surfaces+Icons), then App. -->
  <script type="text/babel" src="Responsive.jsx"></script>
  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="Forms.jsx"></script>
  <script type="text/babel" src="Surfaces.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="MembersScreen.jsx"></script>
  <script type="text/babel" src="SettingsScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
