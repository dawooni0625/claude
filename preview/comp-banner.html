<!doctype html>
<!-- @dsCard group="Brand" name="Banner" subtitle="padding 32×40 · radius 16 · 4 color styles" viewport="700x420" -->
<html lang="ko"><head><meta charset="utf-8"><title>Banner</title>
<link rel="stylesheet" href="_card.css">
<style>
  .bn { padding:32px 40px; border-radius:16px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .bn__title { font-size:18px; font-weight:700; margin-bottom:6px; }
  .bn__body { font-size:14px; opacity:.85; }
  .bn__btn { flex:none; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:700; background:#FFF; }
  .stack { display:flex; flex-direction:column; gap:14px; }
</style>
</head><body>
<div class="stack">
  <div class="bn" style="background:#EEF2FD;color:#2D3378;">
    <div><div class="bn__title">🚀 KIRBS 2.0이 출시됐습니다</div><div class="bn__body">더 빠르고 강력해진 보고서 관리 시스템. 지금 바로 업그레이드하세요.</div></div>
    <span class="bn__btn" style="color:#2D3378;">지금 시작하기</span>
  </div>
  <div class="bn" style="background:#EDFAF4;color:#1E8E54;">
    <div><div class="bn__title">🎁 3월 한정 무료 체험 이벤트</div><div class="bn__body">Pro 플랜 30일 무료 체험 신청을 받고 있습니다. 혜택을 놓치지 마세요.</div></div>
    <span class="bn__btn" style="color:#1E8E54;">무료 신청하기</span>
  </div>
  <div class="bn" style="background:#FDF8E6;color:#B08000;">
    <div><div class="bn__title">🔧 시스템 점검 안내</div><div class="bn__body">4월 5일(금) 새벽 2시~4시 서버 점검이 예정되어 있습니다.</div></div>
    <span class="bn__btn" style="color:#B08000;">자세히 보기</span>
  </div>
  <div class="bn" style="background:#F8F8FB;color:#333333;">
    <div><div class="bn__title">✅ 보고서 제출이 완료됐습니다</div><div class="bn__body">영업일 기준 3일 이내에 결과를 안내해 드립니다.</div></div>
    <span class="bn__btn" style="color:#2D3378;border:1px solid #E0E0E0;">현황 확인</span>
  </div>
</div>
</body></html>
