<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Heading scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="stack-sm">
  
    <div style="display:grid;grid-template-columns: 90px 1fr 130px;gap:14px;align-items:baseline;">
      <div style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">heading-1<br><span style="opacity:.7;">32px / 700</span></div>
      <div style="font-size:32px;font-weight:700;line-height:1.3;color:var(--color-text-primary);">h1 · 한글 제목</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">페이지 제목·모달 헤더</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 90px 1fr 130px;gap:14px;align-items:baseline;">

    </div>
  
    <div style="display:grid;grid-template-columns: 90px 1fr 130px;gap:14px;align-items:baseline;">

      <div style="font-size:11px;color:var(--color-text-tertiary);">폼 레이블·사이드바</div>

</div>

</html>
