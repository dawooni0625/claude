<!doctype html>
<!-- @dsCard group="Brand" name="Border radius" subtitle="none → xl + full pill" viewport="700x180" -->
<html lang="ko"><head><meta charset="utf-8"><title>Border radius</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid;grid-template-columns: repeat(7, 1fr); gap:10px;align-items:end;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:0px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">none</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">0px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:2px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">xs</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">2px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:4px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">sm</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">4px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:8px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">md</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">8px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:12px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">lg</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">12px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:16px;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">xl</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">16px</div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:72px;height:72px;background:var(--color-brand-quaternary);border:2px solid var(--color-brand-primary);border-radius:50%;"></div>
      <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">full</div>
      <div style="font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);">9999px</div>
    </div>
  
</div>
</body></html>
