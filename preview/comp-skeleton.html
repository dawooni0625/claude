<!doctype html>
<!-- @dsCard group="Brand" name="Skeleton loading" subtitle="Shimmer · lines · avatar · card · 1.5s" viewport="700x360" -->
<html lang="ko"><head><meta charset="utf-8"><title>Skeleton loading</title>
<link rel="stylesheet" href="_card.css">
<style>
  .sk {
    position:relative; overflow:hidden;
    background:var(--skeleton-bg);
    border-radius:var(--skeleton-radius);
  }
  .sk::after {
    content:""; position:absolute; inset:0;
    transform:translateX(-100%);
    background:linear-gradient(90deg, transparent 0%, var(--skeleton-shimmer) 50%, transparent 100%);
    animation: sk-shimmer var(--skeleton-duration) ease-in-out infinite;
  }
  @keyframes sk-shimmer { 100% { transform:translateX(100%); } }
  @media (prefers-reduced-motion: reduce) {
    .sk::after { animation:none; }
  }
  .sk-line { height:12px; }
  .sk-line-lg { height:16px; border-radius:var(--skeleton-radius); }
  .sk-avatar { width:48px; height:48px; border-radius:50%; flex-shrink:0; }
  .sk-card {
    border:1px solid #E0E0E0; border-radius:8px; padding:16px;
    display:flex; gap:14px; align-items:flex-start;
  }
  .grow { flex:1; min-width:0; }
</style>
</head><body>
<div class="stack-md">

  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">TEXT LINES</div>
    <div class="stack-sm">
      <div class="sk sk-line-lg" style="width:55%;"></div>
      <div class="sk sk-line" style="width:100%;"></div>
      <div class="sk sk-line" style="width:92%;"></div>
      <div class="sk sk-line" style="width:78%;"></div>
    </div>
  </div>

  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">LIST ITEM · avatar + text</div>
    <div class="sk-card">
      <div class="sk sk-avatar"></div>
      <div class="grow stack-sm" style="padding-top:4px;">
        <div class="sk sk-line-lg" style="width:40%;"></div>
        <div class="sk sk-line" style="width:70%;"></div>
        <div class="sk sk-line" style="width:55%;"></div>
      </div>
      <div class="sk" style="width:64px;height:28px;border-radius:99px;"></div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#828282;">
    <span class="token-tag">--skeleton-bg</span>
    <span class="token-tag">--skeleton-shimmer</span>
    <span class="token-tag">--skeleton-duration 1.5s</span>
  </div>

</div>
</body></html>
