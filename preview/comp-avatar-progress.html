<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Avatar · Progress · Spinner</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body>
<div class="stack-md">
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">AVATAR · 40 / 64 / 80</div>
    <div style="display:flex;gap:12px;align-items:flex-end;">
      <div style="width:40px;height:40px;border-radius:50%;background:#2D3378;color:#FFF;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;">DW</div>
      <div style="width:64px;height:64px;border-radius:50%;background:#5B63A8;color:#FFF;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;">JK</div>
      <div style="width:80px;height:80px;border-radius:50%;background:#8E96D3;color:#FFF;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:26px;">M</div>
      <div style="width:64px;height:64px;border-radius:50%;background:#E8EAF6;color:#2D3378;border:2px solid #FFF;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;">+5</div>
    </div>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">PROGRESS · sm 4 / md 8 / lg 12</div>
    <div class="stack-sm">
      <div style="height:4px;background:#E0E0E0;border-radius:9999px;overflow:hidden;"><div style="height:100%;width:35%;background:#2D3378;"></div></div>
      <div style="height:8px;background:#E0E0E0;border-radius:9999px;overflow:hidden;"><div style="height:100%;width:62%;background:#2D3378;"></div></div>
      <div style="height:12px;background:#E0E0E0;border-radius:9999px;overflow:hidden;"><div style="height:100%;width:88%;background:#27AE60;"></div></div>
    </div>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">SPINNER · sm 16 / md 24 / lg 40</div>
    <div style="display:flex;gap:16px;align-items:center;">
      
        <svg width="16" height="16" viewBox="0 0 24 24" style="animation:spin 700ms linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="#E0E0E0" stroke-width="2" fill="none"/>
          <path d="M22 12a10 10 0 0 0-10-10" stroke="#2D3378" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      
        <svg width="24" height="24" viewBox="0 0 24 24" style="animation:spin 700ms linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="#E0E0E0" stroke-width="2" fill="none"/>
          <path d="M22 12a10 10 0 0 0-10-10" stroke="#2D3378" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      
        <svg width="40" height="40" viewBox="0 0 24 24" style="animation:spin 700ms linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="#E0E0E0" stroke-width="2" fill="none"/>
          <path d="M22 12a10 10 0 0 0-10-10" stroke="#2D3378" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
</div>
</body></html>
