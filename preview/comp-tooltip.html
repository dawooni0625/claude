<!doctype html>
<!-- @dsCard group="Brand" name="Tooltip" subtitle="small / medium / big · top & bottom · #1D1D1D" viewport="700x280" -->
<html lang="ko"><head><meta charset="utf-8"><title>Tooltip</title>
<link rel="stylesheet" href="_card.css">
<style>
  .lbl { font-size:11px; font-weight:700; color:#8E8E8E; text-transform:uppercase; letter-spacing:.06em; margin-bottom:20px; }
  .row { display:flex; gap:48px; align-items:center; flex-wrap:wrap; }
  .wrap { position:relative; display:inline-flex; }
  .trigger { border:1px solid #E4E4E4; border-radius:8px; padding:9px 14px; font-size:14px; color:#555555; background:#FFF; }
  .tip { position:absolute; left:50%; transform:translateX(-50%); background:#1D1D1D; color:#FFF; font-size:13px; border-radius:8px; white-space:nowrap; }
  .tip.sm { padding:5px 8px; }
  .tip.md { padding:10px 14px; white-space:normal; width:150px; text-align:center; line-height:1.4; }
  .tip.big { padding:10px 14px; width:170px; line-height:1.4; }
  .tip.top { bottom:calc(100% + 10px); } .tip.bot { top:calc(100% + 10px); }
  .tip::after { content:""; position:absolute; left:50%; margin-left:-6px; border:6px solid transparent; }
  .tip.top::after { top:100%; border-top-color:#1D1D1D; }
  .tip.bot::after { bottom:100%; border-bottom-color:#1D1D1D; }
  .tipbtn { display:inline-block; margin-top:8px; background:#2D3378; color:#FFF; font-weight:700; font-size:12px; padding:6px 12px; border-radius:6px; }
</style>
</head><body>
<div class="lbl">Small · Medium · Big (with button)</div>
<div class="row" style="margin-bottom:48px;">
  <div class="wrap"><div class="tip sm top">간단한 설명</div><div class="trigger">Top · Small</div></div>
  <div class="wrap"><div class="tip md top">버튼을 클릭하면 저장됩니다.</div><div class="trigger">Top · Medium</div></div>
  <div class="wrap"><div class="tip big top">이 기능은 Pro 플랜에서만 사용할 수 있습니다.<span class="tipbtn">업그레이드</span></div><div class="trigger">Top · Big</div></div>
</div>
<div class="row">
  <div class="wrap"><div class="trigger">Bottom · Small</div><div class="tip sm bot">간단한 설명</div></div>
  <div class="wrap"><div class="trigger">Bottom · Medium</div><div class="tip md bot">버튼을 클릭하면 저장됩니다.</div></div>
</div>
</body></html>
