<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Brand colors</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 16px;">
  
<div class="swatch">
  <div class="swatch__chip" style="background:#2D3378;"></div>
  <div class="swatch__name">Primary</div>
  <div class="swatch__hex">#2D3378</div>
  <div class="token-tag">--color-brand-primary</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#5B63A8;"></div>
  <div class="swatch__name">Secondary</div>
  <div class="swatch__hex">#5B63A8</div>
  <div class="token-tag">--color-brand-secondary</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#8E96D3;"></div>
  <div class="swatch__name">Tertiary</div>
  <div class="swatch__hex">#8E96D3</div>
  <div class="token-tag">--color-brand-tertiary</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#E8EAF6;"></div>
  <div class="swatch__name">Quaternary</div>
  <div class="swatch__hex">#E8EAF6</div>
  <div class="token-tag">--color-brand-quaternary</div>
</div>
</div>

</body>
</html>
