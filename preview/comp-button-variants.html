<!doctype html>
<!-- @dsCard group="Brand" name="Buttons — variants" subtitle="Primary · Secondary · Tertiary · Danger" viewport="700x260" -->
<html lang="ko"><head><meta charset="utf-8"><title>Buttons · variants</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn {
    display:inline-flex; align-items:center; justify-content:center;
    height:44px; min-width:80px; padding:0 20px;
    font-family:var(--font-family-base); font-weight:700; font-size:16px;
    border-radius:6px; border:0; cursor:pointer;
    transition: all 100ms cubic-bezier(0,0,0.2,1);
    line-height:1; gap:8px;
  }
  .btn-primary { background:#2D3378; color:#FFFFFF; }
  .btn-primary:hover { background:#232860; }
  .btn-secondary { background:#FFFFFF; color:#2D3378; border:1.5px solid #2D3378; }
  .btn-secondary:hover { background:#E8EAF6; }
  .btn-tertiary { background:transparent; color:#2D3378; }
  .btn-tertiary:hover { background:#E8EAF6; }
  .btn-danger { background:#F54336; color:#FFFFFF; }
  .btn-disabled { background:#C6C6C6; color:#FFFFFF; cursor:not-allowed; }
  .btn-sm { height:36px; min-width:70px; font-size:14px; padding:0 14px; }
  .btn-md { height:44px; min-width:80px; font-size:16px; padding:0 20px; }
  .btn-lg { height:52px; min-width:90px; font-size:18px; padding:0 24px; }
  .btn-xl { height:60px; min-width:100px; font-size:20px; padding:0 28px; }
  .btn-pill { border-radius:99px; }
  
</style>
</head><body>
<div class="stack-md">
  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">VARIANTS</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-tertiary">Tertiary</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-disabled" disabled>Disabled</button>
    </div>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">SHAPES</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn btn-primary">Square · 6px</button>
      <button class="btn btn-primary btn-pill">Pill · 99px</button>
    </div>
  </div>
</div>
</body></html>
