<!doctype html>
<!-- @dsCard group="Brand" name="Table states" subtitle="Loading · Empty · Sort · Selected row" viewport="700x620" -->
<html lang="ko"><head><meta charset="utf-8"><title>Table states</title>
<link rel="stylesheet" href="_card.css">
<style>
  .tbl-wrap { border:1px solid #E0E0E0; border-radius:8px; overflow:hidden; font-size:14px; color:#1D1D1D; }
  table { width:100%; border-collapse:collapse; }
  thead tr { height:40px; background:#F8F8FB; color:#333333; font-size:13px; font-weight:700; text-align:left; }
  th { padding:0 16px; font-weight:700; }
  tbody tr { height:48px; border-top:1px solid #E0E0E0; }
  td { padding:0 16px; }
  .muted { color:#828282; }
  .sub { color:#4F4F4F; }
  /* sortable header */
  .th-sort { cursor:pointer; user-select:none; }
  .th-sort .arrow { color:#BDBDBD; font-size:11px; margin-left:4px; }
  .th-sort.active { color:#2D3378; }
  .th-sort.active .arrow { color:#2D3378; }
  /* selected row */
  tr.selected { background:#E8EAF6; }
  .checkbox { width:18px; height:18px; border-radius:4px; border:1.5px solid #BDBDBD; display:inline-flex; align-items:center; justify-content:center; }
  .checkbox.on { background:#2D3378; border-color:#2D3378; color:#FFF; font-size:12px; font-weight:700; }
  /* status badge */
  .badge { border-radius:99px; padding:3px 10px; font-size:12px; font-weight:700; white-space:nowrap; }
  .b-done { background:#EDFAF4; color:#27AE60; }
  .b-prog { background:#E8F1FD; color:#2F80ED; }
  .b-wait { background:#FDF8E6; color:#B08000; }
  .b-err  { background:#FDEEEE; color:#EB5757; }
  /* skeleton */
  .sk { position:relative; overflow:hidden; background:#E0E0E0; border-radius:4px; height:12px; }
  .sk::after { content:""; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: sk 1.5s ease-in-out infinite; }
  @keyframes sk { 100% { transform:translateX(100%); } }
  @media (prefers-reduced-motion: reduce) { .sk::after { animation:none; } }
</style>
</head><body>
<div class="stack-md">

  <!-- LOADING -->
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">LOADING · skeleton rows</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th style="width:60px;">No</th><th>응시자</th><th>검사 유형</th><th style="width:110px;">상태</th></tr></thead>
        <tbody>
          <tr><td><div class="sk" style="width:24px;"></div></td><td><div class="sk" style="width:70%;"></div></td><td><div class="sk" style="width:55%;"></div></td><td><div class="sk" style="width:60px;height:18px;border-radius:99px;"></div></td></tr>
          <tr><td><div class="sk" style="width:24px;"></div></td><td><div class="sk" style="width:60%;"></div></td><td><div class="sk" style="width:62%;"></div></td><td><div class="sk" style="width:60px;height:18px;border-radius:99px;"></div></td></tr>
          <tr><td><div class="sk" style="width:24px;"></div></td><td><div class="sk" style="width:75%;"></div></td><td><div class="sk" style="width:48%;"></div></td><td><div class="sk" style="width:60px;height:18px;border-radius:99px;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- EMPTY -->
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">EMPTY · no data</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th style="width:60px;">No</th><th>응시자</th><th>검사 유형</th><th style="width:110px;">상태</th></tr></thead>
      </table>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:36px 16px;text-align:center;">
        <div style="width:40px;height:40px;border-radius:50%;background:#F0F0F5;display:flex;align-items:center;justify-content:center;color:#BDBDBD;font-size:20px;">∅</div>
        <div style="font-size:14px;font-weight:700;color:#333333;">아직 응시 기록이 없어요</div>
        <div style="font-size:12px;color:#828282;">검사를 배정하면 여기에 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- SORT + SELECTED -->
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">SORT &amp; SELECTED ROW · 결과 상태</div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:48px;"><span class="checkbox" style="margin-top:2px;"></span></th>
            <th>응시자</th>
            <th class="th-sort active">점수<span class="arrow">▼</span></th>
            <th class="th-sort">응시일<span class="arrow">▲▼</span></th>
            <th style="width:96px;">상태</th>
          </tr>
        </thead>
        <tbody>
          <tr class="selected">
            <td><span class="checkbox on">✓</span></td>
            <td>김민준</td>
            <td>92</td>
            <td class="sub">2026. 06. 02</td>
            <td><span class="badge b-done">완료</span></td>
          </tr>
          <tr>
            <td><span class="checkbox"></span></td>
            <td>이서연</td>
            <td>—</td>
            <td class="sub">2026. 06. 05</td>
            <td><span class="badge b-prog">진행중</span></td>
          </tr>
          <tr>
            <td><span class="checkbox"></span></td>
            <td>박지후</td>
            <td>—</td>
            <td class="sub">2026. 06. 06</td>
            <td><span class="badge b-wait">대기</span></td>
          </tr>
          <tr>
            <td><span class="checkbox"></span></td>
            <td>최예린</td>
            <td>—</td>
            <td class="sub">2026. 06. 04</td>
            <td><span class="badge b-err">오류</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</body></html>
