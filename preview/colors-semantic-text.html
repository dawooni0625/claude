<!doctype html>
<!-- @dsCard group="Brand" name="Semantic text colors" subtitle="–color-text-* token map" viewport="700x280" -->
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Semantic text</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="stack-sm">
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#000000;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#000000;font-weight:700;">Primary <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">본문 핵심 텍스트</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-primary</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#2D2D2D;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#2D2D2D;font-weight:700;">Secondary <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">보조 설명</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-secondary</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#555555;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#555555;font-weight:700;">Tertiary <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">메타·캡션</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-tertiary</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#8E8E8E;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#8E8E8E;font-weight:700;">Disabled <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">비활성 텍스트</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-disabled</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#2D3378;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#2D3378;font-weight:700;">Brand <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">강조·브랜드</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-brand</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#5B63A8;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#5B63A8;font-weight:700;">Link <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">하이퍼링크</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-link</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#F54336;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#F54336;font-weight:700;">Error <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">에러 메시지</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-error</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 14px 1fr 90px;gap:12px;align-items:center;">
      <div style="width:14px;height:14px;background:#42A148;border-radius:3px;border:1px solid rgba(0,0,0,0.05);"></div>
      <div style="font-size:14px;color:#42A148;font-weight:700;">Success <span style="color:var(--color-text-tertiary);font-weight:400;font-size:12px;margin-left:6px;">성공 메시지</span></div>
      <div class="token-tag" style="font-size:10px;">--color-text-success</div>
    </div>
  
</div>

</body>
</html>
