<!doctype html>
<!-- @dsCard group="Brand" name="Tag input" subtitle="Enter / comma to add · removable chips" viewport="700x200" -->
<html lang="ko"><head><meta charset="utf-8"><title>Tag input</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field-lbl { font-size:13px; font-weight:700; color:#2D2D2D; margin-bottom:6px; }
  .tin { min-height:48px; border:1.5px solid #2D3378; border-radius:8px; background:#FFF; padding:8px;
         display:flex; flex-wrap:wrap; gap:6px; align-items:center; box-shadow:0 0 0 3px rgba(45,51,120,.1); }
  .tag { height:28px; border-radius:6px; padding:0 10px; display:flex; align-items:center; gap:6px;
         background:#E8EAF6; color:#2D3378; font-size:14px; font-weight:500; }
  .tag svg { color:#8E8E8E; cursor:pointer; }
  .tin input { border:none; outline:none; font-size:14px; flex:1; min-width:120px; color:#1D1D1D; padding:0 4px; }
  .tin input::placeholder { color:#C6C6C6; }
  .help { font-size:12px; color:#8E8E8E; margin-top:5px; }
</style>
</head><body>
<div class="field-lbl">키워드 태그</div>
<div class="tin">
  <span class="tag">디자인시스템 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></span>
  <span class="tag">UI/UX <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></span>
  <span class="tag">프로토타입 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></span>
  <input placeholder="태그 추가..." />
</div>
<div class="help">Enter 또는 쉼표(,)로 태그를 추가합니다.</div>
</body></html>
