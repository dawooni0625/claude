<!doctype html>
<!-- @dsCard group="Brand" name="Gray scale" subtitle="Black 1–2 + Gray 1–5 (Figma Grayscale 정렬)" viewport="700x200" -->
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Gray scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px;">
  
<div class="swatch">
  <div class="swatch__chip" style="background:#000000;"></div>
  <div class="swatch__name">Black 1</div>
  <div class="swatch__hex">#000000</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#1D1D1D;"></div>
  <div class="swatch__name">Black 2</div>
  <div class="swatch__hex">#1D1D1D</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#2D2D2D;"></div>
  <div class="swatch__name">Gray 1</div>
  <div class="swatch__hex">#2D2D2D</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#555555;"></div>
  <div class="swatch__name">Gray 2</div>
  <div class="swatch__hex">#555555</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#8E8E8E;"></div>
  <div class="swatch__name">Gray 3</div>
  <div class="swatch__hex">#8E8E8E</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#C6C6C6;"></div>
  <div class="swatch__name">Gray 4</div>
  <div class="swatch__hex">#C6C6C6</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#E4E4E4;"></div>
  <div class="swatch__name">Gray 5</div>
  <div class="swatch__hex">#E4E4E4</div>
  
</div>
</div>

</body>
</html>
