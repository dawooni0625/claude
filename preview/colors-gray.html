<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Gray scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="grid" style="grid-template-columns: repeat(7, 1fr); gap: 10px;">
  
<div class="swatch">
  <div class="swatch__chip" style="background:#000000;"></div>
  <div class="swatch__name">Black 1</div>
  <div class="swatch__hex">#000000</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#1D1D1D;"></div>
  <div class="swatch__name">Black 2</div>
  <div class="swatch__hex">#1D1D1D</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#333333;"></div>
  <div class="swatch__name">Gray 1</div>
  <div class="swatch__hex">#333333</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#4F4F4F;"></div>
  <div class="swatch__name">Gray 2</div>
  <div class="swatch__hex">#4F4F4F</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#828282;"></div>
  <div class="swatch__name">Gray 3</div>
  <div class="swatch__hex">#828282</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#BDBDBD;"></div>
  <div class="swatch__name">Gray 4</div>
  <div class="swatch__hex">#BDBDBD</div>
  
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#E0E0E0;"></div>
  <div class="swatch__name">Gray 5</div>
  <div class="swatch__hex">#E0E0E0</div>
  
</div>
</div>

</body>
</html>
