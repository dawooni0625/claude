<!doctype html>
<!-- @dsCard group="Brand" name="App nav (bottom bar)" subtitle="72px · 24px icons · center FAB · light/dark" viewport="700x360" -->
<html lang="ko"><head><meta charset="utf-8"><title>App nav</title>
<link rel="stylesheet" href="_card.css">
<style>
  .lbl { font-size:11px; font-weight:700; color:#8E8E8E; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
  .grp + .grp { margin-top:24px; }
  .bar { height:72px; display:flex; align-items:center; justify-content:space-around; border-radius:14px; padding:0 8px; max-width:380px; }
  .bar.light { background:#FFF; border:1px solid #E4E4E4; }
  .bar.dark { background:#1D1D1D; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:10px; font-weight:700; position:relative; }
  .light .tab { color:#C6C6C6; }
  .light .tab.on { color:#2D3378; }
  .dark .tab { color:#6B6B6B; }
  .dark .tab.on { color:#FFF; }
  .badge { position:absolute; top:-4px; right:6px; min-width:16px; height:16px; padding:0 4px; border-radius:9999px; background:#F54336; color:#FFF; font-size:9px; display:flex; align-items:center; justify-content:center; }
  .fab { width:52px; height:52px; border-radius:50%; background:#2D3378; color:#FFF; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(45,51,120,.35); margin-top:-12px; }
</style>
</head><body>
<div class="grp">
  <div class="lbl">Light — 4 tabs</div>
  <div class="bar light">
    <div class="tab on"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>홈</div>
    <div class="tab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><rect x="7" y="10" width="3" height="8"></rect><rect x="14" y="6" width="3" height="12"></rect></svg>보고서</div>
    <div class="tab"><span class="badge">3</span><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>메시지</div>
    <div class="tab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>프로필</div>
  </div>
</div>
<div class="grp">
  <div class="lbl">Dark — center FAB · 5 tabs</div>
  <div class="bar dark">
    <div class="tab on"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>홈</div>
    <div class="tab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><rect x="7" y="10" width="3" height="8"></rect><rect x="14" y="6" width="3" height="12"></rect></svg>보고서</div>
    <div class="fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>
    <div class="tab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>메시지</div>
    <div class="tab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>프로필</div>
  </div>
</div>
</body></html>
