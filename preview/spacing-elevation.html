<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:grid;grid-template-columns: repeat(5, 1fr); gap:14px;padding:6px;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:88px;height:88px;background:#FFFFFF;border-radius:8px;box-shadow:none;border:1px solid rgba(0,0,0,0.04);"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">elevation-0</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">평면</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:88px;height:88px;background:#FFFFFF;border-radius:8px;box-shadow:0px 1px 3px rgba(45,51,120,0.08);border:1px solid rgba(0,0,0,0.04);"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">elevation-1</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">카드·테이블 행</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:88px;height:88px;background:#FFFFFF;border-radius:8px;box-shadow:0px 2px 8px rgba(45,51,120,0.12);border:1px solid rgba(0,0,0,0.04);"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">elevation-2</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">드롭다운·툴팁</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:88px;height:88px;background:#FFFFFF;border-radius:8px;box-shadow:0px 4px 16px rgba(45,51,120,0.16);border:1px solid rgba(0,0,0,0.04);"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">elevation-3</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">모달·다이얼로그</div>
      </div>
    </div>
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:88px;height:88px;background:#FFFFFF;border-radius:8px;box-shadow:0px 8px 32px rgba(45,51,120,0.20);border:1px solid rgba(0,0,0,0.04);"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-family-mono);font-size:11px;font-weight:700;">elevation-4</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">전체화면 팝업</div>
      </div>
    </div>
  
</div>
</body></html>
