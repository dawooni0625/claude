<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="stack-sm">
  
    <div style="display:grid;grid-template-columns: 80px 1fr;gap:16px;align-items:baseline;">
      <div style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">display-2xl<br><span style="opacity:.7;">64px</span></div>
      <div style="font-size:64px;font-weight:700;line-height:1.1;letter-spacing:-0.015em;color:var(--color-text-primary);">디스플레이 2XL</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 80px 1fr;gap:16px;align-items:baseline;">
      <div style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">display-xl<br><span style="opacity:.7;">48px</span></div>
      <div style="font-size:48px;font-weight:700;line-height:1.1;letter-spacing:-0.015em;color:var(--color-text-primary);">디스플레이 XL</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 80px 1fr;gap:16px;align-items:baseline;">
      <div style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">display-lg<br><span style="opacity:.7;">40px</span></div>
      <div style="font-size:40px;font-weight:700;line-height:1.1;letter-spacing:-0.015em;color:var(--color-text-primary);">디스플레이 LG</div>
    </div>
  
    <div style="display:grid;grid-template-columns: 80px 1fr;gap:16px;align-items:baseline;">

    </div>
  
    <div style="display:grid;grid-template-columns: 80px 1fr;gap:16px;align-items:baseline;">
      <div style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">display-sm<br><span style="opacity:.7;">24px</span></div>
      <div style="font-size:24px;font-weight:700;line-height:1.1;letter-spacing:-0.015em;color:var(--color-text-primary);">디스플레이 SM</div>
    </div>
