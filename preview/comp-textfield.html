<!doctype html>
<!-- @dsCard group="Brand" name="Text fields" subtitle="Default · Focus · Error states" viewport="700x360" -->
<html lang="ko"><head><meta charset="utf-8"><title>Text fields</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn {
    display:inline-flex; align-items:center; justify-content:center;
    height:56px; min-width:80px; padding:0 20px;
    font-family:var(--font-family-base); font-weight:700; font-size:16px;
    border-radius:8px; border:0; cursor:pointer;
    transition: all 100ms cubic-bezier(0,0,0.2,1);
    line-height:1; gap:8px;
  }
  .btn-primary { background:#2D3378; color:#FFFFFF; }
  .btn-primary:hover { background:#232860; }
  .btn-secondary { background:#FFFFFF; color:#2D3378; border:1.5px solid #2D3378; }
  .btn-secondary:hover { background:#E8EAF6; }
  .btn-tertiary { background:transparent; color:#2D3378; }
  .btn-tertiary:hover { background:#E8EAF6; }
  .btn-danger { background:#EB5757; color:#FFFFFF; }
  .btn-disabled { background:#BDBDBD; color:#FFFFFF; cursor:not-allowed; }
  .btn-sm { height:45px; min-width:70px; font-size:14px; padding:0 14px; }
  .btn-md { height:56px; min-width:80px; font-size:16px; padding:0 20px; }
  .btn-lg { height:63px; min-width:90px; font-size:18px; padding:0 24px; }
  .btn-xl { height:70px; min-width:100px; font-size:20px; padding:0 28px; }
  .btn-pill { border-radius:99px; }
  
</style>
</head><body>
<div class="stack-md">
  <div>
    <label style="display:block;font-size:13px;font-weight:700;color:#333333;margin-bottom:6px;">이메일</label>
    <input type="email" placeholder="name@example.com" style="width:100%;height:48px;padding:8px 14px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:14px;font-family:inherit;color:#1D1D1D;outline:none;" onfocus="this.style.borderColor='#2D3378';this.style.boxShadow='0 0 0 3px rgba(45,51,120,0.12)'" onblur="this.style.borderColor='#E0E0E0';this.style.boxShadow='none'">
    <div style="font-size:12px;color:#4F4F4F;margin-top:5px;">회사 이메일을 입력해 주세요.</div>
  </div>
  <div>
    <label style="display:block;font-size:13px;font-weight:700;color:#333333;margin-bottom:6px;">비밀번호 (포커스)</label>
    <input type="password" value="••••••••" style="width:100%;height:48px;padding:8px 14px;border:1.5px solid #2D3378;border-radius:8px;font-size:14px;font-family:inherit;box-shadow:0 0 0 3px rgba(45,51,120,0.12);outline:none;">
  </div>
  <div>
    <label style="display:block;font-size:13px;font-weight:700;color:#333333;margin-bottom:6px;">에러 상태</label>
    <input type="text" value="잘못된 값" style="width:100%;height:48px;padding:8px 14px;border:1.5px solid #EB5757;border-radius:8px;font-size:14px;font-family:inherit;color:#1D1D1D;outline:none;">
    <div style="font-size:12px;color:#EB5757;margin-top:5px;">유효하지 않은 입력입니다.</div>
  </div>
</div>
</body></html>
