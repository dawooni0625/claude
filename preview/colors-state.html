<!doctype html>
<!-- @dsCard group="Brand" name="State colors" subtitle="Info / Success / Warning / Error" viewport="700x230" -->
<html lang="ko">
<head>
<meta charset="utf-8">
<title>State colors</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 16px;">
  
<div class="swatch">
  <div class="swatch__chip" style="background:#2F80ED;"></div>
  <div class="swatch__name">Info</div>
  <div class="swatch__hex">#2F80ED</div>
  <div class="token-tag">--color-state-info</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#27AE60;"></div>
  <div class="swatch__name">Success</div>
  <div class="swatch__hex">#27AE60</div>
  <div class="token-tag">--color-state-success</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#E2B93B;"></div>
  <div class="swatch__name">Warning</div>
  <div class="swatch__hex">#E2B93B</div>
  <div class="token-tag">--color-state-warning</div>
</div>
  
<div class="swatch">
  <div class="swatch__chip" style="background:#EB5757;"></div>
  <div class="swatch__name">Error</div>
  <div class="swatch__hex">#EB5757</div>
  <div class="token-tag">--color-state-error</div>
</div>
</div>

</body>
</html>
