<!doctype html>
<!-- @dsCard group="Brand" name="Dark mode" subtitle="[data-theme='dark'] auto-swap" viewport="700x240" -->
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Dark mode</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div data-theme="dark" style="background:#0F0F12;color:#F0F0F0;padding:20px 24px;border-radius:12px;margin:-8px;">
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 10px;">
    
      <div class="swatch">
        <div class="swatch__chip" style="background:#0F0F12;border-color:rgba(255,255,255,0.08);"></div>
        <div class="swatch__name" style="color:#F0F0F0;">Page</div>
        <div class="swatch__hex" style="color:#9B9B9B;">#0F0F12</div>
      </div>
    
      <div class="swatch">
        <div class="swatch__chip" style="background:#1A1A1F;border-color:rgba(255,255,255,0.08);"></div>
        <div class="swatch__name" style="color:#F0F0F0;">Surface</div>
        <div class="swatch__hex" style="color:#9B9B9B;">#1A1A1F</div>
      </div>
    
      <div class="swatch">
        <div class="swatch__chip" style="background:#252529;border-color:rgba(255,255,255,0.08);"></div>
        <div class="swatch__name" style="color:#F0F0F0;">Elevated</div>
        <div class="swatch__hex" style="color:#9B9B9B;">#252529</div>
      </div>
    
      <div class="swatch">
        <div class="swatch__chip" style="background:#333338;border-color:rgba(255,255,255,0.08);"></div>
        <div class="swatch__name" style="color:#F0F0F0;">Muted</div>
        <div class="swatch__hex" style="color:#9B9B9B;">#333338</div>
      </div>
    
      <div class="swatch">
        <div class="swatch__chip" style="background:#A9A5E8;border-color:rgba(255,255,255,0.08);"></div>
        <div class="swatch__name" style="color:#F0F0F0;">Brand</div>
        <div class="swatch__hex" style="color:#9B9B9B;">#A9A5E8</div>
      </div>
    
  </div>
  <div style="margin-top:14px;font-size:12px;color:#9B9B9B;">[data-theme="dark"] · 시맨틱 토큰만 자동 전환됨</div>
</div>

</body>
</html>
