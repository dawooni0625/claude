<!doctype html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="–space-{n} = n × 2px" viewport="700x340" -->
<html lang="ko"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="stack-sm">
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-1</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:2px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">2px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">아이콘-텍스트 극소</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-2</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:4px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">4px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">뱃지 패딩</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-4</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:8px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">8px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">버튼 그룹·아이템</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-6</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:12px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">12px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">버튼·인풋 좌우</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-8</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:16px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">16px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">카드 패딩</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-12</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:24px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">24px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">섹션 구분</span>
    </div>
  
    <div style="display:grid;grid-template-columns: 70px 1fr 140px;gap:14px;align-items:center;">
      <span class="token-tag" style="text-align:center;">--space-16</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:32px;height:16px;background:#2D3378;border-radius:2px;"></div>
        <span style="font-family:var(--font-family-mono);font-size:11px;color:var(--color-text-tertiary);">32px</span>
      </div>
      <span style="font-size:12px;color:var(--color-text-tertiary);">페이지 블록</span>
    </div>
  
</div>
<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--color-border-default);font-size:11px;color:var(--color-text-tertiary);">
  공식: <code style="font-size:11px;padding:1px 4px;">--space-{n}</code> = n × 2px
</div>
</body></html>
