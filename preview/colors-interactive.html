<!doctype html>
<!-- @dsCard group="Brand" name="Interactive colors" subtitle="Default → hover → active → disabled" viewport="700x260" -->
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Interactive colors</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="stack-md">
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">PRIMARY · default → hover → active → disabled</div>
    <div style="display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--color-border-default);">
      <div style="flex:1;height:48px;background:#2D3378;"></div>
      <div style="flex:1;height:48px;background:#232968;"></div>
      <div style="flex:1;height:48px;background:#1A1F52;"></div>
      <div style="flex:1;height:48px;background:#BDBDBD;"></div>
    </div>
    <div style="display:flex;gap:0;font-family:var(--font-family-mono);font-size:10px;color:var(--color-text-tertiary);margin-top:6px;">
      <span style="flex:1;">#2D3378</span><span style="flex:1;">#232968</span><span style="flex:1;">#1A1F52</span><span style="flex:1;">#BDBDBD</span>
    </div>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:8px;">DANGER · default → hover</div>
    <div style="display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--color-border-default);">
      <div style="flex:1;height:32px;background:#EB5757;"></div>
      <div style="flex:1;height:32px;background:#C94040;"></div>
    </div>
  </div>
</div>

</body>
</html>
