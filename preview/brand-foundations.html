<!doctype html>
<!-- @dsCard group="Brand" name="Focus / Skeleton / Opacity" subtitle="Focus ring (2px #2F80ED), skeleton shimmer (1.5s), opacity scale (disabled .38 / overlay .50)." viewport="700x320" -->
<html lang="ko"><head><meta charset="utf-8"><title>Focus ring · Skeleton · Opacity</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body>
<div class="stack-md">
  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">FOCUS RING · 2px · offset 2 · #2F80ED</div>
    <div style="display:flex;gap:14px;align-items:center;padding:6px;">
      <button style="height:45px;padding:0 16px;background:#2D3378;color:#FFF;border:0;border-radius:8px;outline:2px solid #2F80ED;outline-offset:2px;font-weight:700;">Focused</button>
      <input style="height:45px;padding:0 14px;border:1.5px solid #2D3378;border-radius:8px;outline:2px solid #2F80ED;outline-offset:2px;font-family:inherit;" value="Focused input">
    </div>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">SKELETON · radius 4 · 1.5s shimmer</div>
    <div class="stack-sm" style="background:#FFF;padding:12px;border:1px solid #E0E0E0;border-radius:8px;">
      <div class="sk" style="width:60%;height:12px;"></div>
      <div class="sk" style="width:90%;height:12px;"></div>
      <div class="sk" style="width:40%;height:12px;"></div>
    </div>
    <style>
      .sk { background: linear-gradient(90deg,#E0E0E0,#F4F4F8,#E0E0E0); background-size: 200% 100%; border-radius:4px; animation: shimmer 1.5s linear infinite; }
      @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
  </div>
  <div>
    <div class="label-eyebrow" style="margin-bottom:10px;">OPACITY · disabled .38 · overlay .50</div>
    <div style="display:flex;gap:12px;">
      <div style="height:45px;padding:0 16px;background:#2D3378;color:#FFF;border-radius:8px;display:inline-flex;align-items:center;font-weight:700;">Normal</div>
      <div style="height:45px;padding:0 16px;background:#2D3378;color:#FFF;border-radius:8px;display:inline-flex;align-items:center;font-weight:700;opacity:.38;">Disabled .38</div>
      <div style="height:45px;padding:0 16px;background:rgba(0,0,0,0.5);color:#FFF;border-radius:8px;display:inline-flex;align-items:center;font-weight:700;">Overlay .50</div>
    </div>
  </div>
</div>
</body></html>
